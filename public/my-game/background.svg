<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="60%" r="70%" fx="50%" fy="60%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="45%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#080d13"/>
    </radialGradient>

    <radialGradient id="glowCenter" cx="50%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#dc2626" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowTop" cx="50%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="trailGrad" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="30%" stop-color="#dc2626" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.15"/>
    </linearGradient>

    <linearGradient id="trailGlow" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0"/>
      <stop offset="40%" stop-color="#dc2626" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="axisGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.08"/>
    </linearGradient>

    <linearGradient id="horizGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <clipPath id="chartClip">
      <rect x="100" y="60" width="640" height="620"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="800" height="800" fill="url(#bgGrad)"/>

  <!-- Ambient glow layers -->
  <rect width="800" height="800" fill="url(#glowCenter)"/>
  <rect width="800" height="800" fill="url(#glowTop)"/>

  <!-- Subtle noise texture overlay -->
  <rect width="800" height="800" fill="url(#gridFade)" opacity="0.5"/>

  <!-- Grid lines - horizontal -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="100" y1="160" x2="740" y2="160"/>
    <line x1="100" y1="280" x2="740" y2="280"/>
    <line x1="100" y1="400" x2="740" y2="400"/>
    <line x1="100" y1="520" x2="740" y2="520"/>
    <line x1="100" y1="640" x2="740" y2="640"/>
  </g>

  <!-- Grid lines - vertical -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="230" y1="100" x2="230" y2="680"/>
    <line x1="360" y1="100" x2="360" y2="680"/>
    <line x1="490" y1="100" x2="490" y2="680"/>
    <line x1="620" y1="100" x2="620" y2="680"/>
  </g>

  <!-- Y-axis -->
  <line x1="100" y1="100" x2="100" y2="680" stroke="url(#axisGrad)" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="100" y1="680" x2="740" y2="680" stroke="url(#horizGrad)" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <g fill="#dc2626" opacity="0.35" font-family="monospace" font-size="11">
    <text x="60" y="684" text-anchor="end">0.5x</text>
    <text x="60" y="564" text-anchor="end">2x</text>
    <text x="60" y="444" text-anchor="end">4x</text>
    <text x="60" y="324" text-anchor="end">8x</text>
    <text x="60" y="204" text-anchor="end">16x</text>
    <text x="60" y="124" text-anchor="end">32x</text>
  </g>

  <!-- X-axis tick marks -->
  <g stroke="#dc2626" stroke-width="1" opacity="0.25">
    <line x1="230" y1="680" x2="230" y2="690"/>
    <line x1="360" y1="680" x2="360" y2="690"/>
    <line x1="490" y1="680" x2="490" y2="690"/>
    <line x1="620" y1="680" x2="620" y2="690"/>
  </g>

  <!-- Main trajectory curve - wide glow -->
  <path d="M100,680 C180,670 250,640 320,580 C380,530 430,440 470,340 C500,260 520,190 540,140"
        stroke="url(#trailGlow)" stroke-width="40" fill="none" stroke-linecap="round"
        clip-path="url(#chartClip)" filter="url(#softGlow)"/>

  <!-- Main trajectory curve - core line -->
  <path d="M100,680 C180,670 250,640 320,580 C380,530 430,440 470,340 C500,260 520,190 540,140"
        stroke="url(#trailGrad)" stroke-width="3" fill="none" stroke-linecap="round"
        clip-path="url(#chartClip)" filter="url(#glow)"/>

  <!-- Area fill under curve -->
  <path d="M100,680 C180,670 250,640 320,580 C380,530 430,440 470,340 C500,260 520,190 540,140 L540,680 Z"
        fill="url(#trailGlow)" opacity="0.3" clip-path="url(#chartClip)"/>

  <!-- Dot at the curve tip -->
  <circle cx="540" cy="140" r="5" fill="#fbbf24" filter="url(#bigGlow)" opacity="0.9"/>
  <circle cx="540" cy="140" r="3" fill="#fef3c7"/>

  <!-- Small data points along curve -->
  <g fill="#dc2626" opacity="0.5">
    <circle cx="180" cy="670" r="2"/>
    <circle cx="260" cy="635" r="2"/>
    <circle cx="320" cy="580" r="2"/>
    <circle cx="390" cy="510" r="2.5"/>
    <circle cx="440" cy="420" r="2.5"/>
    <circle cx="480" cy="310" r="3"/>
    <circle cx="510" cy="230" r="3"/>
  </g>

  <!-- Scattered stars / ambient dots -->
  <g fill="#ffffff" opacity="0.15">
    <circle cx="150" cy="200" r="1"/>
    <circle cx="650" cy="150" r="1.2"/>
    <circle cx="700" cy="300" r="0.8"/>
    <circle cx="200" cy="350" r="1"/>
    <circle cx="680" cy="500" r="1.1"/>
    <circle cx="350" cy="130" r="0.9"/>
    <circle cx="580" cy="250" r="1"/>
    <circle cx="160" cy="500" r="0.7"/>
    <circle cx="420" cy="700" r="1"/>
    <circle cx="600" cy="620" r="0.8"/>
    <circle cx="300" cy="720" r="1.2"/>
    <circle cx="720" cy="400" r="0.9"/>
  </g>

  <!-- Additional ambient elements -->
  <g fill="#dc2626" opacity="0.06">
    <circle cx="650" cy="200" r="60"/>
    <circle cx="200" cy="600" r="45"/>
  </g>

  <!-- Subtle horizontal level lines at key multipliers -->
  <g stroke="#f59e0b" stroke-dasharray="4,8" opacity="0.08">
    <line x1="100" y1="520" x2="740" y2="520"/>
    <line x1="100" y1="400" x2="740" y2="400"/>
  </g>

  <!-- Corner vignette overlay -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.5"/>
  </radialGradient>
  <rect width="800" height="800" fill="url(#vignette)"/>
</svg>
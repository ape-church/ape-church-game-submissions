<svg width="1200" height="800" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ff9d4a;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#ff7f2a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="rockGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3531;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2a251f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1612;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4a37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a3829;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2f22;stop-opacity:1" />
    </linearGradient>

    <filter id="rockTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" />
      <feColorMatrix type="saturate" values="0.3"/>
      <feBlend mode="multiply" in="SourceGraphic"/>
    </filter>

    <pattern id="rockPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#rockGradient)"/>
      <circle cx="15" cy="20" r="2" fill="#4a4138" opacity="0.6"/>
      <circle cx="65" cy="45" r="1.5" fill="#5a5148" opacity="0.5"/>
      <circle cx="35" cy="70" r="1" fill="#4a4138" opacity="0.7"/>
      <circle cx="80" cy="25" r="2.5" fill="#3a352f" opacity="0.4"/>
      <circle cx="45" cy="85" r="1.2" fill="#5a5148" opacity="0.6"/>
    </pattern>

    <linearGradient id="railGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a5050;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a3f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a3030;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Base dark background -->
  <rect width="1200" height="800" fill="#0f0d0b"/>

  <!-- Rock walls with texture -->
  <rect width="1200" height="800" fill="url(#rockPattern)" filter="url(#rockTexture)"/>

  <!-- Left wall rocky detail -->
  <path d="M 0 0 Q 100 150 50 300 Q 120 450 80 600 L 0 800 Z" fill="#1a1612" opacity="0.8"/>
  <path d="M 0 0 Q 80 150 30 300 Q 100 450 60 600 L 0 800 Z" fill="#2a251f" opacity="0.4"/>

  <!-- Right wall rocky detail -->
  <path d="M 1200 0 Q 1100 150 1150 300 Q 1080 450 1120 600 L 1200 800 Z" fill="#1a1612" opacity="0.8"/>
  <path d="M 1200 0 Q 1120 150 1170 300 Q 1100 450 1140 600 L 1200 800 Z" fill="#2a251f" opacity="0.4"/>

  <!-- Wooden support beam - Left -->
  <rect x="120" y="0" width="35" height="800" fill="url(#woodGradient)" opacity="0.9"/>
  <rect x="125" y="0" width="5" height="800" fill="#6d5a47" opacity="0.5"/>
  <rect x="145" y="0" width="3" height="800" fill="#3d2f22" opacity="0.7"/>

  <!-- Wooden support beam - Right -->
  <rect x="1045" y="0" width="35" height="800" fill="url(#woodGradient)" opacity="0.9"/>
  <rect x="1050" y="0" width="5" height="800" fill="#6d5a47" opacity="0.5"/>
  <rect x="1070" y="0" width="3" height="800" fill="#3d2f22" opacity="0.7"/>

  <!-- Cross beams -->
  <rect x="120" y="50" width="960" height="25" fill="url(#woodGradient)" opacity="0.8"/>
  <rect x="120" y="55" width="960" height="5" fill="#6d5a47" opacity="0.4"/>

  <rect x="120" y="720" width="960" height="25" fill="url(#woodGradient)" opacity="0.8"/>
  <rect x="120" y="725" width="960" height="5" fill="#6d5a47" opacity="0.4"/>

  <!-- Mine cart rails on floor -->
  <line x1="350" y1="800" x2="420" y2="400" stroke="url(#railGradient)" stroke-width="8" opacity="0.5"/>
  <line x1="450" y1="800" x2="520" y2="400" stroke="url(#railGradient)" stroke-width="8" opacity="0.5"/>

  <line x1="750" y1="800" x2="680" y2="400" stroke="url(#railGradient)" stroke-width="8" opacity="0.5"/>
  <line x1="850" y1="800" x2="780" y2="400" stroke="url(#railGradient)" stroke-width="8" opacity="0.5"/>

  <!-- Rail cross-ties -->
  <rect x="400" y="720" width="400" height="6" fill="#4a3829" opacity="0.4" transform="rotate(-5 600 720)"/>
  <rect x="390" y="650" width="420" height="6" fill="#4a3829" opacity="0.4" transform="rotate(-5 600 650)"/>
  <rect x="380" y="580" width="440" height="6" fill="#4a3829" opacity="0.4" transform="rotate(-5 600 580)"/>
  <rect x="370" y="510" width="460" height="6" fill="#4a3829" opacity="0.4" transform="rotate(-5 600 510)"/>

  <!-- Left lantern glow -->
  <ellipse cx="200" cy="140" rx="150" ry="180" fill="url(#lanternGlow)" opacity="0.4"/>

  <!-- Left lantern -->
  <rect x="185" y="110" width="30" height="8" fill="#2a2520" rx="2"/>
  <path d="M 195 118 L 205 118 L 208 160 L 192 160 Z" fill="#3a3028" stroke="#1a1510" stroke-width="1"/>
  <rect x="190" y="125" width="20" height="30" fill="#ff9d4a" opacity="0.7" rx="2"/>
  <rect x="192" y="127" width="16" height="26" fill="#ffb366" opacity="0.5" rx="1"/>
  <circle cx="200" cy="140" r="3" fill="#ffe4b3" opacity="0.9"/>

  <!-- Right lantern glow -->
  <ellipse cx="1000" cy="200" rx="150" ry="180" fill="url(#lanternGlow)" opacity="0.4"/>

  <!-- Right lantern -->
  <rect x="985" y="170" width="30" height="8" fill="#2a2520" rx="2"/>
  <path d="M 995 178 L 1005 178 L 1008 220 L 992 220 Z" fill="#3a3028" stroke="#1a1510" stroke-width="1"/>
  <rect x="990" y="185" width="20" height="30" fill="#ff9d4a" opacity="0.7" rx="2"/>
  <rect x="992" y="187" width="16" height="26" fill="#ffb366" opacity="0.5" rx="1"/>
  <circle cx="1000" cy="200" r="3" fill="#ffe4b3" opacity="0.9"/>

  <!-- Gold nugget sparkles on walls -->
  <circle cx="250" cy="420" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="253" cy="423" r="1" fill="#ffed4e" opacity="0.8"/>

  <circle cx="890" cy="520" r="2.5" fill="#ffd700" opacity="0.5"/>
  <circle cx="894" cy="524" r="1.2" fill="#ffed4e" opacity="0.7"/>

  <circle cx="320" cy="580" r="1.5" fill="#ffd700" opacity="0.7"/>
  <circle cx="322" cy="582" r="0.8" fill="#ffed4e" opacity="0.9"/>

  <circle cx="950" cy="650" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="953" cy="653" r="1" fill="#ffed4e" opacity="0.8"/>

  <circle cx="180" cy="480" r="1.8" fill="#ffd700" opacity="0.5"/>
  <circle cx="182" cy="482" r="0.9" fill="#ffed4e" opacity="0.7"/>

  <!-- Pickaxe leaning on left beam -->
  <line x1="145" y1="450" x2="165" y2="520" stroke="#5d4a37" stroke-width="3" opacity="0.7"/>
  <path d="M 163 518 L 165 520 L 167 518 Z" fill="#4a3829"/>
  <path d="M 144 448 L 154 445 L 148 455 Z" fill="#6a6a6a" opacity="0.8"/>
  <path d="M 144 448 L 147 452 Z" stroke="#8a8a8a" stroke-width="1" opacity="0.6"/>

  <!-- Rock pile bottom left -->
  <ellipse cx="100" cy="760" rx="60" ry="40" fill="#3a3531" opacity="0.6"/>
  <ellipse cx="80" cy="770" rx="45" ry="30" fill="#2a251f" opacity="0.7"/>
  <ellipse cx="130" cy="775" rx="50" ry="35" fill="#3a3531" opacity="0.5"/>

  <!-- Rock pile bottom right -->
  <ellipse cx="1100" cy="750" rx="70" ry="45" fill="#3a3531" opacity="0.6"/>
  <ellipse cx="1080" cy="765" rx="55" ry="35" fill="#2a251f" opacity="0.7"/>
  <ellipse cx="1130" cy="770" rx="60" ry="38" fill="#3a3531" opacity="0.5"/>

  <!-- Atmospheric depth - center darkness -->
  <ellipse cx="600" cy="400" rx="400" ry="300" fill="#000000" opacity="0.3"/>

  <!-- Top shadow vignette -->
  <rect x="0" y="0" width="1200" height="80" fill="url(#rockGradient)" opacity="0.3"/>

  <!-- Dust particles -->
  <circle cx="300" cy="300" r="1" fill="#8a7a6a" opacity="0.3"/>
  <circle cx="450" cy="250" r="0.8" fill="#8a7a6a" opacity="0.4"/>
  <circle cx="600" cy="200" r="1.2" fill="#8a7a6a" opacity="0.25"/>
  <circle cx="750" cy="280" r="0.9" fill="#8a7a6a" opacity="0.35"/>
  <circle cx="900" cy="220" r="1.1" fill="#8a7a6a" opacity="0.3"/>
  <circle cx="350" cy="500" r="0.7" fill="#8a7a6a" opacity="0.4"/>
  <circle cx="550" cy="450" r="1" fill="#8a7a6a" opacity="0.3"/>
  <circle cx="800" cy="520" r="0.9" fill="#8a7a6a" opacity="0.35"/>
  <circle cx="400" cy="600" r="1.1" fill="#8a7a6a" opacity="0.25"/>
  <circle cx="700" cy="580" r="0.8" fill="#8a7a6a" opacity="0.4"/>
</svg>
